name: "Generate Weekly Visualization Data"

on:
  workflow_dispatch:
    inputs:
      disease:
        description: "Disease to generate visualization data for."
        required: true
        type: choice
        options:
          - covid
          - rsv
      reference_date:
        description: "Reference date (YYYY-MM-DD, must be Saturday). Leave empty for auto-calculation."
        required: false
        type: string
  repository_dispatch:
    types: [covid-ensemble-added, rsv-ensemble-added]

permissions:
  contents: write

jobs:
  update-visualization-data:
    if: ${{ github.repository_owner == 'CDCgov' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      DISEASE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.disease || inputs.disease }}
    steps:
      - name: "Set Up hubhelpr"
        uses: cdcgov/hubhelpr/actions/setup-hubhelpr@main

      - name: "Get Hub Repository"
        id: get_hub_repo
        shell: Rscript {0}
        run: |
          disease <- Sys.getenv("DISEASE")
          hub_repo_owner <- hubhelpr:::get_hub_repo_owner(disease)
          hub_repo_name <- hubhelpr:::get_hub_repo_name(disease)
          hub_repo <- glue::glue("{hub_repo_owner}/{hub_repo_name}")
          writeLines(
            paste0("hub_repo=", hub_repo),
            Sys.getenv("GITHUB_OUTPUT")
          )

      - name: "Generate Installation Token"
        id: get_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}

      - name: "Checkout Current Repository"
        uses: actions/checkout@v6

      - name: "Checkout Hub Repository"
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.get_hub_repo.outputs.hub_repo }}
          path: .local-hub-copy

      - name: "Generate Data, Commit, and Create PR"
        uses: cdcgov/hubhelpr/actions/generate-viz-data@main
        with:
          disease: ${{ env.DISEASE }}
          github_token: ${{ steps.get_token.outputs.token }}
          base_hub_path: .local-hub-copy
          reference_date: ${{ inputs.reference_date }}
          excluded_locations: '{"all": ["VI", "GU", "AS", "MP", "UM"]}'
        env:
          DATA_CDC_GOV_API_KEY_ID: ${{ secrets.NHSN_API_KEY_ID }}
          DATA_CDC_GOV_API_KEY_SECRET: ${{ secrets.NHSN_API_KEY_SECRET }}
