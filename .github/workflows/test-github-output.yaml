name: "Test GITHUB_OUTPUT From R"

on:
  workflow_dispatch:

jobs:
  test-github-output:
    runs-on: ubuntu-latest
    steps:
      - name: "Set Up R"
        uses: r-lib/actions/setup-r@v2

      - name: "Set Output With cat() (Should Work)"
        id: cat_method
        shell: Rscript {0}
        run: |
          cat(
            "disease=covid",
            file = Sys.getenv("GITHUB_OUTPUT"),
            sep = "\n",
            append = TRUE
          )

      - name: "Read cat() Output"
        run: |
          echo "cat method disease: ${{ steps.cat_method.outputs.disease }}"

      - name: "Set Output With Sys.setenv() (Shouldn't Work)"
        id: setenv_method
        shell: Rscript {0}
        run: |
          Sys.setenv(disease = "rsv")
          message("Inside R, Sys.getenv('disease') = ", Sys.getenv("disease"))

      - name: "Read Sys.setenv() Output"
        run: |
          echo "setenv method disease: '${{ steps.setenv_method.outputs.disease }}'"
          echo "(expected: empty string)"
